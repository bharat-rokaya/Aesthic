<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-blue-100">

  <!-- Navbar -->
  <header class="sticky top-0 z-10 flex gap-3 bg-blue-100 shadow p-4 items-center justify-between">
    <h1 class="text-xl text-gray-700 font-semibold">My Cart</h1>
    <button id="shopMore" class="bg-blue-200 hover:bg-sky-200 text-blue-600 border border-blue-500 hover:border-blue-600 px-4 py-2 rounded-full">
      Shop More <i class="fas fa-arrow-right"></i>
    </button>
  </header>

  <!-- Cart Container -->
  <div id="cart-container" class="p-4 sm:p-6 space-y-4"></div>

  <!-- Total -->
  <div class="p-4 sm:p-6 bg-blue-100 shadow mt-4">
    <h2 class="text-xl font-semibold text-green-500">
      Total: $<span id="total">0</span>
    </h2>

    <button id="checkout" 
      class="mt-4 w-full sm:w-auto bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition duration-200 eae hover:scale-101">
      Checkout
    </button>
  </div>

  <script src="cart.js"></script>
</body>
</html>
